version: 2.1

orbs:
  prodsec: snyk/prodsec-orb@1

executors:
  default:
    docker:
      - image: cimg/go:1.26
    resource_class: medium

commands:
  restore-go-cache:
    steps:
      - restore_cache:
          name: Restore Go module cache
          keys:
            - go-mod-{{ checksum "go.sum" }}
  save-go-cache:
    steps:
      - save_cache:
          name: Save Go module cache
          key: go-mod-{{ checksum "go.sum" }}
          paths:
            - /home/circleci/go/pkg/mod
  restore-tools-cache:
    steps:
      - restore_cache:
          name: Restore tools cache (golangci-lint, pact)
          keys:
            - tools-v1-{{ arch }}-{{ checksum "Makefile" }}
  save-tools-cache:
    steps:
      - save_cache:
          name: Save tools cache (golangci-lint, pact)
          key: tools-v1-{{ arch }}-{{ checksum "Makefile" }}
          paths:
            - .bin

# Define the jobs we want to run for this project
jobs:
  lint-and-format:
    executor: default
    steps:
      - checkout
      - restore-go-cache
      - restore-tools-cache
      - run:
          name: Install tools
          command: make tools
      - save-tools-cache
      - run: make format
      - run: make generate
      - run:
          name: Run go mod tidy
          command: go mod tidy
      - save-go-cache
      - run:
          name: Check if there are any changes
          command: |
            git status --porcelain=v1 | tee /dev/stderr | wc -l | grep -qE '^ *0 *$$'
      - run: make lint
  unit-test:
    executor: default
    steps:
      - checkout
      - restore-go-cache
      - run:
          name: Run unit tests
          command: |
            mkdir -p test/results
            gotestsum --junitfile test/results/unit-tests.xml -- -cover ./...
      - save-go-cache
      - store_test_results:
          path: test/results
  smoke-test:
    executor: default
    steps:
      - checkout
      - restore-go-cache
      - restore-tools-cache
      - run:
          name: Install tools
          command: make tools
      - save-tools-cache
      - save-go-cache
      - run:
          name: Run smoke tests
          command: make smoke-test
  contract-test:
    executor: default
    steps:
      - checkout
      - restore-go-cache
      - restore-tools-cache
      - run:
          name: Install tools
          command: make tools
      - save-tools-cache
      - save-go-cache
      - run:
          name: Run contract tests
          command: make contract-test
  build:
    executor: default
    steps:
      - checkout
      - restore-go-cache
      - run:
          name: Build
          command: make build
      - save-go-cache
  security-scans:
    executor: default
    steps:
      - checkout
      - prodsec/security_scans:
          mode: auto
          iac-scan: disabled

# Orchestrate our job run sequence
workflows:
  test-and-build:
    jobs:
      - prodsec/secrets-scan:
          name: Scan repository for secrets
          context:
            - snyk-bot-slack
          channel: dx-local-alerts
      - security-scans:
          name: Security Scans
          context: code-client-go
      - lint-and-format:
          name: Lint & Format
          context: code-client-go
      - unit-test:
          name: Unit tests
          context: code-client-go
      - smoke-test:
          name: Smoke tests
          context:
            - code-client-go-smoke-tests-token # SMOKE_TEST_TOKEN
      - contract-test:
          name: Contract tests
          context:
            - code-client-go-contract-tests # PACT_BROKER_BASE_URL, PACT_BROKER_TOKEN
      - build:
          name: Build